services:
    api:
        container_name: api
        build: ./api
        ports:
            - "3000:3000"
        env_file:
            - ./api/.env.docker
        volumes:
            - ./api:/app
            - cargo_cache:/usr/local/cargo/registry
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:16-alpine
        container_name: db
        ports:
            - "5434:5432"
        env_file:
            - ./.env
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U root -d recido"]
            interval: 5s
            timeout: 5s
            retries: 10

    web:
        container_name: web
        build: ./web
        ports:
            - "8000:8000"
        env_file:
            - .env
        volumes:
            - ./web:/app
            - /opt/venv
        depends_on:
            - api
        command: python manage.py runserver 0.0.0.0:8000

    mobile:
        container_name: mobile
        build: ./mobile
        ports:
            - "8080:8080"
        env_file:
            - .env
        volumes:
            - ./mobile:/app
            - flutter_cache:/root/.pub-cache
        command: flutter run -d web-server --web-port 8080 --web-hostname 0.0.0.0

volumes:
    pg_data:
    cargo_cache:
    flutter_cache:

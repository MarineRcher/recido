services:
    api:
        container_name: api
        build: ./api
        ports:
            - "3000:3000"
        env_file:
            - ./api/.env.docker
        volumes:
            - ./api:/app
            - cargo_cache:/usr/local/cargo/registry
        depends_on:
            db:
                condition: service_healthy

    db:
        image: postgres:16-alpine
        container_name: db
        ports:
            - "5434:5432"
        env_file:
            - ./.env
        volumes:
            - pg_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U root -d recido"]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    pg_data:
    cargo_cache:
